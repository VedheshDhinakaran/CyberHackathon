<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .box { fill:#0b1220; stroke:#0c6bff22; stroke-width:1.5; rx:6; }
    .title { fill:#9be7ff; font-family: 'IBM Plex Mono', monospace; font-size:14px; font-weight:700 }
    .label { fill:#cfeeff; font-family: 'IBM Plex Mono', monospace; font-size:12px }
    .small { fill:#9fb7c6; font-family: 'Share Tech Mono', monospace; font-size:11px }
    .arrow { stroke:#7fd4ff; stroke-width:2; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7fd4ff" />
    </marker>
  </defs>

  <!-- Frontend cluster -->
  <rect x="40" y="40" width="420" height="220" class="box" />
  <text x="60" y="64" class="title">Frontend</text>
  <text x="60" y="88" class="label">React + Vite + TailwindCSS</text>
  <text x="60" y="112" class="small">Dashboard UI · UploadSection · Timeline</text>
  <text x="60" y="128" class="small">FileBrowser · IOCPanel · SessionTable</text>

  <!-- Backend cluster -->
  <rect x="460" y="40" width="420" height="360" class="box" />
  <text x="480" y="64" class="title">Backend</text>
  <text x="480" y="88" class="label">FastAPI + Background Workers</text>
  <text x="480" y="112" class="small">API Routes · Ingestion · Task Queue</text>
  <text x="480" y="132" class="small">Parsers: pcap_parser, zeek_parser</text>
  <text x="480" y="150" class="small">Analyzers: tcp_reassembler, file_extractor, session builder</text>
  <text x="480" y="168" class="small">Detectors: attack_detector, c2_detector</text>

  <!-- Storage cluster -->
  <rect x="900" y="40" width="260" height="160" class="box" />
  <text x="920" y="64" class="title">Storage</text>
  <text x="920" y="92" class="small">data/uploads/</text>
  <text x="920" y="110" class="small">data/extracted/</text>
  <text x="920" y="128" class="small">data/zeek/</text>
  <text x="920" y="146" class="small">SQLite (data/db/)</text>

  <!-- Arrows / Flow -->
  <line x1="380" y1="160" x2="460" y2="160" class="arrow" />
  <text x="420" y="150" class="small">POST /upload</text>

  <line x1="880" y1="120" x2="900" y2="120" class="arrow" />
  <text x="760" y="140" class="small">Analyzers write files →</text>

  <line x1="760" y1="260" x2="900" y2="200" class="arrow" />
  <text x="760" y="268" class="small">Parsers → DB & Zeek logs</text>

  <line x1="760" y1="200" x2="760" y2="320" x2="420" class="arrow" />

  <!-- User ↔ UI -->
  <line x1="220" y1="280" x2="220" y2="360" class="arrow" />
  <text x="120" y="348" class="small">User (Analyst) via HTTP/REST</text>

  <!-- Backend -> Frontend data fetch -->
  <line x1="640" y1="220" x2="460" y2="220" class="arrow" />
  <text x="520" y="208" class="small">GET /analysis/{id}, /timeline, /files, /iocs, /sessions</text>

  <!-- Footer note -->
  <text x="40" y="700" class="small">Generated diagram: simplified architecture overview for NetRecon Workbench</text>
</svg>
